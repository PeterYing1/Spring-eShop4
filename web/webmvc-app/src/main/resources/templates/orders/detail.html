<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eShop - Order Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; }
        .item-img { max-height: 56px; max-width: 56px; object-fit: contain; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">eShop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalog}">Catalog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart}">My Cart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/orders}">My Orders</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light"
                          th:text="${#authentication.principal.attributes['preferred_username']}">User</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/account/signout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-link nav-link text-light" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mb-3">
        <a th:href="@{/orders}" class="btn btn-outline-secondary btn-sm">&larr; Back to Orders</a>
    </div>

    <div th:if="${errorMsg}" class="alert alert-warning" th:text="${errorMsg}"></div>

    <div th:if="${order != null}">
        <div class="card mb-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Order #<span th:text="${order.ordernumber}">0</span></h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="text-muted">Order Information</h6>
                        <dl class="row">
                            <dt class="col-sm-4">Date</dt>
                            <dd class="col-sm-8"
                                th:text="${#temporals.format(order.date, 'dd MMM yyyy HH:mm')}">—</dd>

                            <dt class="col-sm-4">Status</dt>
                            <dd class="col-sm-8">
                                <span class="badge"
                                      th:classappend="${order.status == 'shipped' ? 'bg-success' :
                                                       order.status == 'cancelled' ? 'bg-danger' :
                                                       order.status == 'paid' ? 'bg-primary' : 'bg-secondary'}"
                                      th:text="${order.status}">status</span>
                            </dd>

                            <dt class="col-sm-4">Description</dt>
                            <dd class="col-sm-8" th:text="${order.description}">—</dd>
                        </dl>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-muted">Shipping Address</h6>
                        <address>
                            <span th:text="${order.street}">Street</span><br/>
                            <span th:text="${order.city}">City</span>,
                            <span th:text="${order.zipcode}">ZIP</span><br/>
                            <span th:text="${order.country}">Country</span>
                        </address>
                    </div>
                </div>
            </div>
        </div>

        <!-- Order Items -->
        <div class="card mb-4">
            <div class="card-header">
                <h6 class="mb-0">Items</h6>
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Image</th>
                            <th>Product</th>
                            <th>Unit Price</th>
                            <th>Quantity</th>
                            <th>Line Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${order.orderitems}">
                            <td>
                                <img th:src="${item.pictureurl}" class="item-img"
                                     th:alt="${item.productname}" alt="Product"/>
                            </td>
                            <td th:text="${item.productname}">Product</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.unitprice, 1, 2)}">$0.00</td>
                            <td th:text="${item.units}">1</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.unitprice.multiply(T(java.math.BigDecimal).valueOf(item.units)), 1, 2)}">$0.00</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="4" class="text-end fw-bold">Order Total:</td>
                            <td class="fw-bold text-success"
                                th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${order == null and errorMsg == null}" class="alert alert-info">
        Order not found.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
