<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eShop - My Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">eShop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalog}">Catalog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart}">My Cart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/orders}">My Orders</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light"
                          th:text="${#authentication.principal.attributes['preferred_username']}">User</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/account/signout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-link nav-link text-light" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>My Orders</h2>

    <div th:if="${errorMsg}" class="alert alert-warning" th:text="${errorMsg}"></div>

    <div th:if="${orders != null and !#lists.isEmpty(orders)}">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Details</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.ordernumber}">0</td>
                    <td th:text="${#temporals.format(order.date, 'dd MMM yyyy HH:mm')}">Date</td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status == 'shipped' ? 'bg-success' :
                                               order.status == 'cancelled' ? 'bg-danger' :
                                               order.status == 'paid' ? 'bg-primary' : 'bg-secondary'}"
                              th:text="${order.status}">status</span>
                    </td>
                    <td th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}">$0.00</td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${order.ordernumber})}"
                           class="btn btn-sm btn-outline-primary">View</a>
                    </td>
                    <td>
                        <form th:action="@{/orders/cancel/{id}(id=${order.ordernumber})}"
                              method="post"
                              th:if="${order.status != 'shipped' and order.status != 'cancelled'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Cancel this order?')">Cancel</button>
                        </form>
                        <span th:if="${order.status == 'shipped' or order.status == 'cancelled'}"
                              class="text-muted small">—</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${orders == null or #lists.isEmpty(orders)}" class="text-center py-5">
        <p class="text-muted fs-5">You have no orders yet.</p>
        <a th:href="@{/catalog}" class="btn btn-primary">Start Shopping</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
