<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eShop - Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">eShop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalog}">Catalog</a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light"
                          th:text="${#authentication.principal.attributes['preferred_username']}">User</span>
                </li>
                <li class="nav-item ms-2" th:if="${basket != null and !#lists.isEmpty(basket.items)}">
                    <span class="text-light small me-2">Ready for payment</span>
                    <a th:href="@{/cart/payment}" class="btn btn-success btn-sm">Checkout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 720px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Payment</h3>
        <a th:href="@{/catalog}" class="btn btn-outline-secondary btn-sm">Back to Shop</a>
    </div>

    <div th:if="${errorMsg}" class="alert alert-warning" th:text="${errorMsg}"></div>

    <div th:if="${basket != null and !#lists.isEmpty(basket.items)}">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Order Summary</h5>

                <table class="table table-borderless mb-0">
                    <tbody>
                        <tr th:each="item : ${basket.items}">
                            <td th:text="${item.productName}">Product Name</td>
                            <td class="text-center text-muted"
                                th:text="'x ' + ${item.quantity}">x 1</td>
                            <td class="text-end fw-semibold"
                                th:text="'$' + ${#numbers.formatDecimal(item.unitPrice.multiply(T(java.math.BigDecimal).valueOf(item.quantity.longValue())), 1, 2)}">$0.00</td>
                        </tr>
                    </tbody>
                    <tfoot class="border-top">
                        <tr>
                            <td colspan="2" class="fw-bold fs-5">Total</td>
                            <td class="text-end fw-bold fs-5 text-success"
                                th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-end mt-3">
            <a th:href="@{/cart/payment}" class="btn btn-success btn-lg">Place Order</a>
        </div>
    </div>

    <div th:if="${basket == null or #lists.isEmpty(basket.items)}" class="text-center py-5">
        <p class="text-muted fs-5">Your basket is empty.</p>
        <a th:href="@{/catalog}" class="btn btn-primary">Browse Catalog</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
