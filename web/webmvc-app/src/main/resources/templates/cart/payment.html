<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eShop - Credit Card Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; }
        .payment-card { border: 1px solid #dee2e6; border-radius: 0.5rem; padding: 1.5rem; background: #fff; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">eShop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalog}">Catalog</a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light"
                          th:text="${#authentication.principal.attributes['preferred_username']}">User</span>
                </li>
                <li class="nav-item ms-2">
                    <span class="text-light small">Enter card details</span>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Credit Card Payment</h3>
        <a th:href="@{/cart/checkout}" class="btn btn-outline-secondary btn-sm">Back to Payment</a>
    </div>

    <div class="row g-4">

        <!-- Order summary (left) -->
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title text-muted text-uppercase small mb-3">Order Summary</h6>
                    <div th:if="${basket != null and !#lists.isEmpty(basket.items)}">
                        <div th:each="item : ${basket.items}" class="d-flex justify-content-between mb-2">
                            <span class="small"
                                  th:text="${item.productName} + ' x ' + ${item.quantity}">Product x 1</span>
                            <span class="small fw-semibold"
                                  th:text="'$' + ${#numbers.formatDecimal(item.unitPrice.multiply(T(java.math.BigDecimal).valueOf(item.quantity.longValue())), 1, 2)}">$0.00</span>
                        </div>
                        <hr/>
                        <div class="d-flex justify-content-between fw-bold">
                            <span>Total</span>
                            <span class="text-success" th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</span>
                        </div>
                    </div>
                    <p th:if="${basket == null or #lists.isEmpty(basket.items)}" class="text-muted text-center mb-0">
                        Basket is empty
                    </p>
                </div>
            </div>
        </div>

        <!-- Credit card form (right) -->
        <div class="col-md-7">
            <form th:action="@{/cart/payment}" method="post" class="payment-card">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="cardHolderName" class="form-label">Cardholder Name</label>
                    <input type="text" class="form-control" id="cardHolderName" name="cardHolderName"
                           th:value="${cardHolderName}" placeholder="Name on card" required/>
                </div>

                <div class="mb-3">
                    <label for="cardTypeId" class="form-label">Card Type</label>
                    <select class="form-select" id="cardTypeId" name="cardTypeId" required>
                        <option value="1">Amex</option>
                        <option value="2">Visa</option>
                        <option value="3">MasterCard</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="cardNumber" class="form-label">Card Number</label>
                    <input type="text" class="form-control" id="cardNumber" name="cardNumber"
                           th:value="${cardNumber}" placeholder="0000 0000 0000 0000"
                           inputmode="numeric" required/>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col">
                        <label for="cardExpiration" class="form-label">Expiration</label>
                        <input type="text" class="form-control" id="cardExpiration" name="cardExpiration"
                               th:value="${cardExpiration}" placeholder="MM/YY" required/>
                    </div>
                    <div class="col">
                        <label for="cardSecurityNumber" class="form-label">Security Code</label>
                        <input type="text" class="form-control" id="cardSecurityNumber" name="cardSecurityNumber"
                               th:value="${cardSecurityNumber}" placeholder="123"
                               inputmode="numeric" required/>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 btn-lg">Submit Payment</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
