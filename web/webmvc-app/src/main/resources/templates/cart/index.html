<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eShop - My Cart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; }
        .cart-img { max-height: 64px; max-width: 64px; object-fit: contain; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">eShop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalog}">Catalog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/cart}">My Cart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/orders}">My Orders</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light"
                          th:text="${#authentication.principal.attributes['preferred_username']}">User</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/account/signout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-link nav-link text-light" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Shopping Cart</h2>

    <div th:if="${errorMsg}" class="alert alert-warning" th:text="${errorMsg}"></div>

    <div th:if="${basket != null and !#lists.isEmpty(basket.items)}">
        <table class="table table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Image</th>
                    <th>Product</th>
                    <th>Unit Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${basket.items}">
                    <td>
                        <img th:src="${item.pictureUrl}" class="cart-img" th:alt="${item.productName}" alt="Product"/>
                    </td>
                    <td th:text="${item.productName}">Product Name</td>
                    <td th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)}">$0.00</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="'$' + ${#numbers.formatDecimal(item.unitPrice.multiply(T(java.math.BigDecimal).valueOf(item.quantity.longValue())), 1, 2)}">$0.00</td>
                    <td>
                        <form th:action="@{/cart/removeitem}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="id" th:value="${item.productId}"/>
                            <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" class="text-end fw-bold">Total:</td>
                    <td class="fw-bold text-success" th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>

        <div class="d-flex gap-2 mt-3">
            <a th:href="@{/catalog}" class="btn btn-outline-secondary">Continue Shopping</a>
            <a th:href="@{/cart/checkout}" class="btn btn-primary">Checkout</a>
        </div>
    </div>

    <div th:if="${basket == null or #lists.isEmpty(basket.items)}" class="text-center py-5">
        <p class="text-muted fs-5">Your cart is empty.</p>
        <a th:href="@{/catalog}" class="btn btn-primary">Browse Catalog</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
