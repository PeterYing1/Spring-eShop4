<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eShop - Catalog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .product-card { height: 100%; }
        .product-card img { max-height: 200px; object-fit: contain; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">eShop</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/catalog}">Catalog</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}">
                        My Cart
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light"
                          th:text="${#authentication.principal.attributes['preferred_username']}">User</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/account/signout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-link nav-link text-light" type="submit">Logout</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/oauth2/authorization/keycloak}">Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page Header -->
<div class="container mt-4">
    <h2>Product Catalog</h2>

    <!-- Filter Form -->
    <form th:action="@{/catalog}" method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <label for="brandFilter" class="col-form-label">Brand:</label>
        </div>
        <div class="col-auto">
            <select id="brandFilter" name="brandFilterApplied" class="form-select">
                <option value="">Select All</option>
                <option th:each="brand : ${brands}"
                        th:value="${brand.id}"
                        th:text="${brand.brand}"
                        th:selected="${brand.id == brandFilterApplied}">Brand</option>
            </select>
        </div>
        <div class="col-auto">
            <label for="typeFilter" class="col-form-label">Type:</label>
        </div>
        <div class="col-auto">
            <select id="typeFilter" name="typeFilterApplied" class="form-select">
                <option value="">Select All</option>
                <option th:each="type : ${types}"
                        th:value="${type.id}"
                        th:text="${type.type}"
                        th:selected="${type.id == typeFilterApplied}">Type</option>
            </select>
        </div>
        <div class="col-auto">
            <input type="hidden" name="pageSize" th:value="${pageSize}"/>
            <button type="submit" class="btn btn-primary">Filter</button>
        </div>
    </form>

    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-md-3 g-4 mb-4">
        <div class="col" th:each="item : ${catalogItems}">
            <div class="card product-card h-100">
                <img th:src="${item.pictureUri}" class="card-img-top p-3" th:alt="${item.name}" alt="Product Image"/>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${item.name}">Product Name</h5>
                    <p class="card-text text-success fw-bold"
                       th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)}">$0.00</p>
                    <div class="mt-auto" sec:authorize="isAuthenticated()">
                        <form th:action="@{/cart/additem}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="productId" th:value="${item.id}"/>
                            <input type="hidden" name="productName" th:value="${item.name}"/>
                            <input type="hidden" name="unitPrice" th:value="${item.price}"/>
                            <input type="hidden" name="pictureUrl" th:value="${item.pictureUri}"/>
                            <input type="hidden" name="quantity" value="1"/>
                            <button type="submit" class="btn btn-success w-100">Add to Cart</button>
                        </form>
                    </div>
                    <div class="mt-auto" sec:authorize="!isAuthenticated()">
                        <a th:href="@{/oauth2/authorization/keycloak}" class="btn btn-outline-success w-100">
                            Login to Add to Cart
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(catalogItems)}" class="alert alert-info">
        No products found matching your criteria.
    </div>

    <!-- Pagination -->
    <nav aria-label="Catalog pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/catalog(pageIndex=${pageIndex - 1}, pageSize=${pageSize}, brandFilterApplied=${brandFilterApplied != 0 ? brandFilterApplied : null}, typeFilterApplied=${typeFilterApplied != 0 ? typeFilterApplied : null})}"
                   aria-label="Previous">
                    &laquo; Previous
                </a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Page ' + (${pageIndex + 1}) + ' of ' + ${totalPages}">Page</span>
            </li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/catalog(pageIndex=${pageIndex + 1}, pageSize=${pageSize}, brandFilterApplied=${brandFilterApplied != 0 ? brandFilterApplied : null}, typeFilterApplied=${typeFilterApplied != 0 ? typeFilterApplied : null})}"
                   aria-label="Next">
                    Next &raquo;
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
