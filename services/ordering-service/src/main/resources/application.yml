server:
  port: 5102

spring:
  application:
    name: ordering-service
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=OrderingDb;encrypt=false;trustServerCertificate=true
    username: sa
    password: Pass@word
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        default_schema: ordering
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ordering
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:5105/realms/eshop

eshop:
  event-bus:
    queue-name: Ordering

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
      path-mapping:
        health: hc
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
